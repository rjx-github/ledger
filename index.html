<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>记账</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#f5f5f5;color:#111;min-height:100vh;padding-bottom:60px;-webkit-tap-highlight-color:transparent;font-size:15px}
.hdr{background:#fff;padding:14px 16px;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:100}
.hdr h1{font-size:18px;font-weight:700}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:53px;z-index:99}
.tab{flex:1;padding:12px 0;text-align:center;font-size:14px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#2563eb;border-bottom-color:#2563eb}
.page{display:none;padding:12px 16px}
.page.active{display:block}
.amt-box{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px;text-align:center;margin-bottom:12px}
.amt-label{font-size:12px;color:#888}
.amt-value{font-size:48px;font-weight:800;font-variant-numeric:tabular-nums;margin:2px 0;min-height:60px;display:flex;align-items:center;justify-content:center}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.num-btn{height:52px;border:1px solid #e5e5e5;border-radius:10px;background:#fff;font-size:20px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.num-btn:active{background:#e8e8e8}
.num-btn.del,.num-btn.clr{color:#888;font-size:18px}
.num-btn.del:active,.num-btn.clr:active{background:#fee;color:#dc2626}
.section{margin-bottom:12px}
.label{font-size:12px;color:#888;margin-bottom:6px;font-weight:600}
.cats{display:flex;gap:8px}
.cat{flex:1;padding:10px 0;border:1px solid #e5e5e5;border-radius:10px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;background:#fff}
.cat.active{background:#2563eb;color:#fff;border-color:#2563eb}
.dt-row{display:flex;gap:8px;flex-wrap:wrap}
.dt-row input{flex:1;min-width:0;padding:8px 12px;border:1px solid #e5e5e5;border-radius:10px;font-size:14px;background:#fff;outline:none}
input[type=text]{width:100%;padding:8px 12px;border:1px solid #e5e5e5;border-radius:10px;font-size:14px;background:#fff;outline:none}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;background:#2563eb;color:#fff;-webkit-appearance:none;margin-top:4px}
.btn:active{opacity:.8}
.btn-sm{padding:10px;font-size:14px}
.sum{display:flex;background:#fff;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;margin-top:16px}
.sum>div{flex:1;text-align:center;padding:12px 0;border-right:1px solid #e5e5e5}
.sum>div:last-child{border-right:none}
.sum-n{font-size:20px;font-weight:700}
.sum-l{font-size:11px;color:#888;margin-top:2px}
.date-hdr{font-size:13px;color:#888;font-weight:600;padding:12px 0 6px}
.rec{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.rec-b{flex:1;min-width:0}
.rec-c{font-size:14px;font-weight:600}
.rec-n{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-m{font-size:11px;color:#888;margin-top:2px}
.rec-a{font-size:18px;font-weight:700;white-space:nowrap}
.rec-d{width:32px;height:32px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#888}
.rec-d:active{background:#dc2626;color:#fff;border-color:#dc2626}
.rng-bar{display:flex;gap:6px;margin-bottom:12px}
.rng{flex:1;padding:8px 0;border:1px solid #e5e5e5;border-radius:10px;background:#fff;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:#888}
.rng.active{border-color:#2563eb;color:#2563eb}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px;margin-bottom:12px}
.big{font-size:32px;font-weight:800}
.mut{font-size:12px;color:#888}
.bar{display:flex;align-items:center;gap:8px;margin-top:8px}
.bar-l{font-size:13px;width:52px;font-weight:600}
.bar-t{flex:1;height:20px;background:#f0f0f0;border-radius:10px;overflow:hidden}
.bar-f{height:100%;border-radius:10px;transition:width .4s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:11px;color:#fff;font-weight:600}
.empty{text-align:center;padding:40px 0;color:#888;font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:10000;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="hdr"><h1>记账</h1></div>
<div class="tabs">
  <div class="tab active" onclick="tab('add')">记账</div>
  <div class="tab" onclick="tab('rec')">记录</div>
  <div class="tab" onclick="tab('sta')">统计</div>
</div>

<div class="page active" id="p-add">
  <div class="amt-box">
    <div class="amt-label">金额</div>
    <div class="amt-value" id="amt">0</div>
  </div>
  <div class="numpad">
    <button class="num-btn" onclick="press(1)">1</button>
    <button class="num-btn" onclick="press(2)">2</button>
    <button class="num-btn" onclick="press(3)">3</button>
    <button class="num-btn" onclick="press(4)">4</button>
    <button class="num-btn" onclick="press(5)">5</button>
    <button class="num-btn" onclick="press(6)">6</button>
    <button class="num-btn" onclick="press(7)">7</button>
    <button class="num-btn" onclick="press(8)">8</button>
    <button class="num-btn" onclick="press(9)">9</button>
    <button class="num-btn del" onclick="pressDel()">←</button>
    <button class="num-btn" onclick="press(0)">0</button>
    <button class="num-btn clr" onclick="pressClr()">C</button>
  </div>
  <div class="section">
    <div class="label">分类</div>
    <div class="cats">
      <div class="cat active" onclick="pickCat(this,'工艺品')">工艺品</div>
      <div class="cat" onclick="pickCat(this,'大衣')">大衣</div>
    </div>
  </div>
  <div class="section">
    <div class="label">日期时间</div>
    <div class="dt-row">
      <input type="date" id="d-date">
      <input type="time" id="d-time">
    </div>
  </div>
  <div class="section"><input type="text" id="d-note" placeholder="备注（可选）" maxlength="60"></div>
  <button class="btn" onclick="save()">保存</button>
  <div class="sum">
    <div><div class="sum-n" id="sc">0</div><div class="sum-l">今日笔数</div></div>
    <div><div class="sum-n" id="st">0</div><div class="sum-l">今日合计</div></div>
    <div><div class="sum-n" id="sa">0</div><div class="sum-l">平均</div></div>
  </div>
</div>

<div class="page" id="p-rec">
  <div class="dt-row" style="margin-bottom:12px">
    <input type="date" id="q-date" onchange="renderRec()">
    <button class="rng" style="flex:0 0 auto;padding:8px 16px" onclick="document.getElementById('q-date').value=ts();renderRec()">今天</button>
  </div>
  <div id="rlist"></div>
</div>

<div class="page" id="p-sta">
  <div class="rng-bar">
    <div class="rng active" data-r="7" onclick="setRng(7)">7天</div>
    <div class="rng" data-r="30" onclick="setRng(30)">30天</div>
    <div class="rng" data-r="0" onclick="setRng(0)">全部</div>
    <div class="rng" data-r="cus" onclick="setRng('cus')">自定义</div>
  </div>
  <div class="dt-row" id="cus-row" style="display:none;margin-bottom:12px">
    <input type="date" id="cus-from" onchange="renderSta()">
    <input type="time" id="cus-from-t" value="00:00" onchange="renderSta()">
    <span style="line-height:38px;color:#888">至</span>
    <input type="date" id="cus-to" onchange="renderSta()">
    <input type="time" id="cus-to-t" value="23:59" onchange="renderSta()">
  </div>
  <div class="card">
    <div class="mut" id="sl">近7天</div>
    <div class="big" id="sv">0</div>
    <div class="mut" id="sn" style="margin-top:4px"></div>
  </div>
  <div class="card">
    <div class="mut" style="margin-bottom:8px">分类</div>
    <div id="scat"></div>
  </div>
  <div class="card">
    <div class="mut" style="margin-bottom:8px">每日</div>
    <div id="sday"></div>
  </div>
  <button class="btn" onclick="exportCsv()">导出 CSV</button>
</div>

<div class="toast" id="toast"></div>

<script>
let buf='';
let curCat='工艺品';
let data=JSON.parse(localStorage.getItem('ledger3')||'[]');
let rng=7;

function ts(){return new Date().toISOString().slice(0,10)}
function now(){const d=new Date();return{date:d.toISOString().slice(0,10),time:d.toTimeString().slice(0,5)}}

function press(n){if(buf.length>=3)return;buf+=n;document.getElementById('amt').textContent=buf}
function pressDel(){buf=buf.slice(0,-1);document.getElementById('amt').textContent=buf||'0'}
function pressClr(){buf='';document.getElementById('amt').textContent='0'}

function pickCat(el,c){document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));el.classList.add('active');curCat=c}

function save(){
  if(!buf){toast('请输入金额');return}
  const r={id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),amount:parseInt(buf),cat:curCat,note:document.getElementById('d-note').value.trim(),date:document.getElementById('d-date').value,time:document.getElementById('d-time').value};
  data.unshift(r);localStorage.setItem('ledger3',JSON.stringify(data));
  buf='';document.getElementById('amt').textContent='0';document.getElementById('d-note').value='';
  const n=now();document.getElementById('d-date').value=n.date;document.getElementById('d-time').value=n.time;
  updSum();toast('已保存');
}

function updSum(){
  const t=ts(),d=data.filter(r=>r.date===t),tot=d.reduce((s,r)=>s+r.amount,0);
  document.getElementById('sc').textContent=d.length;document.getElementById('st').textContent=tot;
  document.getElementById('sa').textContent=d.length?(tot/d.length).toFixed(1):'0';
}

function renderRec(){
  const date=document.getElementById('q-date').value,list=document.getElementById('rlist'),f=data.filter(r=>r.date===date);
  if(!f.length){list.innerHTML='<div class="empty">无记录</div>';return}
  const wk=['日','一','二','三','四','五','六'],d=new Date(date);
  let h='<div class="date-hdr">'+(d.getMonth()+1)+'月'+d.getDate()+'日 周'+wk[d.getDay()]+'</div>';
  f.forEach(r=>{
    h+='<div class="rec"><div class="rec-b"><div class="rec-c">'+r.cat+'</div>'+(r.note?'<div class="rec-n">'+esc(r.note)+'</div>':'')+'<div class="rec-m">'+r.time+'</div></div><div class="rec-a">'+r.amount+'</div><button class="rec-d" onclick="del(\''+r.id+'\')">✕</button></div>';
  });
  list.innerHTML=h;
}

function del(id){data=data.filter(r=>r.id!==id);localStorage.setItem('ledger3',JSON.stringify(data));renderRec();updSum();toast('已删除')}

function setRng(d){
  rng=d;document.querySelectorAll('.rng-bar .rng').forEach(b=>b.classList.toggle('active',b.dataset.r==d));
  document.getElementById('cus-row').style.display=d==='cus'?'flex':'none';
  if(d==='cus'){const n=new Date();document.getElementById('cus-to').value=n.toISOString().slice(0,10);document.getElementById('cus-to-t').value='23:59';const f=new Date(n);f.setDate(f.getDate()-6);document.getElementById('cus-from').value=f.toISOString().slice(0,10);document.getElementById('cus-from-t').value='00:00'}
  renderSta();
}

function renderSta(){
  let from,fromT,to,toT;
  if(rng==='cus'){from=document.getElementById('cus-from').value;if(!from)return;fromT=document.getElementById('cus-from-t').value||'00:00';to=document.getElementById('cus-to').value||'9999-12-31';toT=document.getElementById('cus-to-t').value||'23:59'}
  else if(rng>0){const s=new Date();s.setDate(s.getDate()-rng+1);from=s.toISOString().slice(0,10);fromT='00:00';to='9999-12-31';toT='23:59'}
  else{from='2000-01-01';fromT='00:00';to='9999-12-31';toT='23:59'}
  const f=data.filter(r=>{const dt=r.date+' '+(r.time||'00:00');return dt>=(from+' '+fromT)&&dt<=(to+' '+toT)});
  const total=f.reduce((a,r)=>a+r.amount,0);
  const label=rng==='cus'?(from.slice(5)+' '+fromT+' ~ '+to.slice(5)+' '+toT):(rng?'近'+rng+'天':'全部');
  document.getElementById('sl').textContent=label;document.getElementById('sv').textContent=total;
  document.getElementById('sn').textContent=f.length+' 笔';
  const cm={};f.forEach(r=>{cm[r.cat]=(cm[r.cat]||0)+r.amount});
  const sorted=Object.entries(cm).sort((a,b)=>b[1]-a[1]);const mx=sorted.length?sorted[0][1]:1;
  const cols=['#2563eb','#d97706','#059669','#dc2626','#7c3aed','#6b7280'];
  let ch='';sorted.forEach(([c,v],i)=>{ch+='<div class="bar"><div class="bar-l">'+c+'</div><div class="bar-t"><div class="bar-f" style="width:'+(v/mx*100)+'%;background:'+cols[i%6]+'">'+v+'</div></div></div>'});
  document.getElementById('scat').innerHTML=ch||'<div class="empty">无数据</div>';
  const dm={};f.forEach(r=>{dm[r.date]=(dm[r.date]||0)+r.amount});
  const days=Object.entries(dm).sort((a,b)=>b[0].localeCompare(a[0]));const md=days.length?Math.max(...days.map(d=>d[1])):1;
  let dh='';days.forEach(([d,v])=>{dh+='<div class="bar"><div class="bar-l">'+d.slice(5)+'</div><div class="bar-t"><div class="bar-f" style="width:'+(v/md*100)+'%">'+v+'</div></div></div>'});
  document.getElementById('sday').innerHTML=dh||'<div class="empty">无数据</div>';
}

function exportCsv(){
  const list=rng==='cus'?data.filter(r=>{const from=document.getElementById('cus-from').value;if(!from)return true;const fromT=document.getElementById('cus-from-t').value||'00:00';const to=document.getElementById('cus-to').value||'9999-12-31';const toT=document.getElementById('cus-to-t').value||'23:59';const dt=r.date+' '+(r.time||'00:00');return dt>=(from+' '+fromT)&&dt<=(to+' '+toT)}):rng>0?(()=>{const s=new Date();s.setDate(s.getDate()-rng+1);return data.filter(r=>r.date>=s.toISOString().slice(0,10))})():[...data];
  if(!list.length){toast('无数据可导出');return}
  let csv='\uFEFF日期,时间,分类,金额,备注\n';
  list.forEach(r=>{csv+=r.date+','+(r.time||'')+','+r.cat+','+r.amount+','+((r.note||'').replace(/,/g,'，'))+'\n'});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='记账_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  toast('已导出 '+list.length+' 条');
}

function tab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['add','rec','sta'][i]===n));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='p-'+n));
  if(n==='rec')renderRec();if(n==='sta')renderSta();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

(function(){
  const n=now();document.getElementById('d-date').value=n.date;document.getElementById('d-time').value=n.time;
  document.getElementById('q-date').value=n.date;updSum();
})();
</script>
</body>
</html>
